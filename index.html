<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hand Tracking Website</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <video id="webcam" autoplay playsinline></video>

            <canvas id="output_canvas"></canvas>

            <div class="ui-overlay">
                <h1>Hand Tracking Interface</h1>
                <p id="status">กำลังรอการเชื่อมต่อกล้อง...</p>
            </div>
        </div>
        <div
            class="ui-overlay"
            style="position: fixed; top: 20px; left: 20px; z-index: 1000"
        >
            <div
                id="gesture-output"
                style="
                    color: #00ff00;
                    font-size: 28px;
                    font-weight: bold;
                    text-shadow: 2px 2px #000;
                "
            >
                Gesture: Waiting...
            </div>
            <button
                id="switch-camera-btn"
                style="margin-top: 10px; padding: 10px 20px; cursor: pointer"
            >
                Switch Camera
            </button>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

        <script src="script.js"></script>
    </body>
</html>
