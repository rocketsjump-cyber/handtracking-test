<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hand Tracking - Multi Hands</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>

            <div class="ui-layer">
                <div id="gesture-output">L: Waiting...<br />R: Waiting...</div>
                <div id="gesture-log-container">
                    <strong style="color: #ffeb3b">History Log:</strong>
                    <div id="log-list"></div>
                </div>

                <button id="download-log-btn">Download Log</button>

                <button id="switch-camera-btn">Switch Camera</button>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
        <script src="script.js"></script>
    </body>
</html>
